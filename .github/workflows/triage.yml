name: Auto Fix Issue

on:
  issues:
    types: [labeled]

jobs:
  auto_fix:
    if: github.event.label.name == 'oz-agent'
    name: Auto Fix Issue
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Construct Prompt
        id: prompt
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            // Simplified prompt for the video
            const prompt = `You are the Oz Agent. Fix GitHub Issue #${issue.number}.

            **Issue Title**: ${issue.title}
            **Description**: ${issue.body}

            **CRITICAL INSTRUCTIONS**:
            1. Analyze the code and fix the bug described.
            2. **DO NOT** run any git commands (no git add, commit, push).
            3. **DO NOT** create a PR or use the 'gh' CLI.
            4. JUST EDIT THE FILES on the file system.
            5. When you are done editing, exit. The system will handle the PR.
            `;
            core.setOutput('prompt', prompt);

      - name: Run Oz Agent
        uses: warpdotdev/oz-agent-action@v1
        id: agent
        with:
          prompt: ${{ steps.prompt.outputs.prompt }}
          warp_api_key: ${{ secrets.WARP_API_KEY }}
          # We don't need GH_TOKEN here anymore because the agent isn't using the CLI!

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          # 1. configure git
          git config user.name "Oz Agent"
          git config user.email "agent@warp.dev"

          # 2. Check if the agent actually did work
          if [[ -z $(git status --porcelain) ]]; then
            echo "Agent made no changes."
            # Post a cleaner error message, not the whole log
            gh issue comment "$ISSUE_NUMBER" --body "I analyzed the issue but couldn't identify the code to fix. Please check the logs."
            exit 0
          fi

          # 3. Create Branch and Push
          BRANCH_NAME="fix/issue-$ISSUE_NUMBER"
          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "Fix for Issue #$ISSUE_NUMBER"
          git push origin "$BRANCH_NAME" --force

          # 4. Open PR
          PR_URL=$(gh pr create \
            --title "Fix: ${{ github.event.issue.title }}" \
            --body "I have implemented a fix for Issue #$ISSUE_NUMBER. Please review." \
            --base main \
            --head "$BRANCH_NAME")

          # 5. Comment the Success Link
          gh issue comment "$ISSUE_NUMBER" --body "✅ **Fix Ready!** I have created a Pull Request: $PR_URL"
