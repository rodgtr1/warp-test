name: AI Triage Bot
on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # Crucial: Allows the agent to comment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # FIX 1: Use setup-oz (The CLI Installer) instead of the generic action
      - name: Install Oz CLI
        uses: warpdotdev/setup-oz@v1

      # FIX 2: Run Oz manually so we can pass the Skill and the Token
      - name: Run Triage Agent
        env:
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          # IMPORTANT: We map GITHUB_TOKEN to GH_TOKEN so the 'gh' tool works
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          oz run \
            --skill .warp/triage-skill.md \
            --context "Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }} - ${{ github.event.issue.body }}"
